<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tennis 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a2a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
  canvas { display: block; cursor: crosshair; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 900, H = 600;
canvas.width = W;
canvas.height = H;

// 3D world
const COURT_W = 400;
const COURT_L = 700;
const NET_Z = COURT_L / 2;
const NET_H = 50;

// Camera — behind and above the player
const CAM = { x: 0, y: 160, z: -80, fov: 500 };

const BALL_R = 10;
const MAX_MISSED = 5;
const BASE_SPEED = 250;
const SPEED_INC = 12;

let state = 'start';
let score = 0;
let missed = 0;
let lastTime = 0;
let gameTime = 0;
let flash = 0;
let shake = 0;

// Mouse in screen coords
let mouseX = W / 2;
let mouseY = H / 2;

// Racket state (3D position)
let racket = { x: 0, y: 35, z: 60 };
let swinging = false;
let swingTarget = null;
let swingTimer = 0;
const SWING_DURATION = 0.15; // seconds to reach ball

let ball = null;
let particles = [];

// ---- 3D Projection ----
function project(x, y, z) {
  const dz = z - CAM.z;
  if (dz <= 1) return null;
  const s = CAM.fov / dz;
  return { sx: W / 2 + (x - CAM.x) * s, sy: H / 2 - (y - CAM.y) * s, s };
}

// ---- Unproject screen click to 3D ground plane (y=0) ----
function screenToGround(sx, sy) {
  // Reverse of project at y=groundY
  // We want to find (x, z) on y=groundY plane that projects to (sx, sy)
  // sy = H/2 - (groundY - CAM.y) * (CAM.fov / (z - CAM.z))
  // => (H/2 - sy) = (groundY - CAM.y) * CAM.fov / (z - CAM.z)
  // We actually want the racket plane at some height, let's use racket.y
  const ry = 35; // racket height
  const num = (ry - CAM.y) * CAM.fov;
  const denom = -(sy - H / 2); // H/2 - sy
  if (denom === 0) return null;
  const z = num / denom + CAM.z;
  if (z <= CAM.z) return null;
  const dz = z - CAM.z;
  const x = (sx - W / 2) * dz / CAM.fov + CAM.x;
  return { x, z };
}

// ---- Ball Creation ----
function createBall() {
  const speed = BASE_SPEED + score * SPEED_INC;
  const startX = (Math.random() - 0.5) * COURT_W * 0.6;
  const startZ = COURT_L - 30;
  const startY = 60;

  // Target bounce point on player side
  const bounceX = (Math.random() - 0.5) * COURT_W * 0.6;
  const bounceZ = 60 + Math.random() * 100;

  // Time to reach bounce point
  const dx = bounceX - startX;
  const dz = bounceZ - startZ;
  const dist = Math.sqrt(dx * dx + dz * dz);
  const travelTime = dist / speed;

  const vx = dx / travelTime;
  const vz = dz / travelTime;
  // Compute vy so that y=0 at t=travelTime
  // y(t) = startY + vy*t - 0.5*g*t^2 = 0
  // vy = (0.5*g*t^2 - startY) / t
  const g = 400;
  const vy = (0.5 * g * travelTime * travelTime - startY) / travelTime;

  ball = {
    x: startX, y: startY, z: startZ,
    vx, vy, vz,
    alive: true, hit: false, bounces: 0, speed
  };
}

// ---- Swing / Hit ----
function trySwing() {
  if (!ball || !ball.alive || ball.hit) return;

  // Calculate where the ball will be soon (predict ~0.2s ahead or current pos)
  const predictT = 0.15;
  const bx = ball.x + ball.vx * predictT;
  const by = Math.max(0, ball.y + ball.vy * predictT - 0.5 * 400 * predictT * predictT);
  const bz = ball.z + ball.vz * predictT;

  // Only allow swing if ball is on player's side and within reach
  if (bz > NET_Z || bz < -20) return;

  // Set swing target
  swinging = true;
  swingTarget = { x: bx, y: Math.max(20, by), z: bz };
  swingTimer = 0;
}

function performHit() {
  if (!ball || !ball.alive || ball.hit) return;

  const dx = ball.x - racket.x;
  const dy = ball.y - racket.y;
  const dz = ball.z - racket.z;
  const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);

  if (dist < 80) {
    ball.hit = true;
    score++;
    flash = 0.3;

    // Send ball back over the net
    const targetX = (Math.random() - 0.5) * COURT_W * 0.5;
    const targetZ = COURT_L + 50;
    const returnSpeed = ball.speed * 1.1;
    const rdx = targetX - ball.x;
    const rdz = targetZ - ball.z;
    const rdist = Math.sqrt(rdx * rdx + rdz * rdz);
    const rt = rdist / returnSpeed;

    ball.vx = rdx / rt;
    ball.vz = rdz / rt;
    ball.vy = 150 + Math.random() * 80;

    // Hit particles
    for (let i = 0; i < 18; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 50 + Math.random() * 150;
      particles.push({
        x: ball.x, y: ball.y, z: ball.z,
        vx: Math.cos(a) * sp, vy: 50 + Math.random() * 150, vz: Math.sin(a) * sp * 0.3 + 80,
        life: 0.4 + Math.random() * 0.3, hue: 50 + Math.random() * 30
      });
    }
  }
}

function missedBall() {
  missed++;
  shake = 1;
  if (missed >= MAX_MISSED) {
    state = 'over';
  } else {
    setTimeout(() => { if (state === 'playing') createBall(); }, 700);
  }
}

function startGame() {
  state = 'playing';
  score = 0;
  missed = 0;
  gameTime = 0;
  particles = [];
  ball = null;
  flash = 0;
  shake = 0;
  swinging = false;
  createBall();
  lastTime = performance.now();
}

// ---- Update ----
function update(dt) {
  if (state !== 'playing') return;
  gameTime += dt;
  if (flash > 0) flash -= dt;
  if (shake > 0) shake -= dt * 3;

  // Racket follows mouse (map screen to 3D)
  const ground = screenToGround(mouseX, mouseY);
  if (ground && !swinging) {
    const tx = Math.max(-COURT_W / 2 + 20, Math.min(COURT_W / 2 - 20, ground.x));
    const tz = Math.max(20, Math.min(NET_Z - 30, ground.z));
    racket.x += (tx - racket.x) * Math.min(1, dt * 12);
    racket.z += (tz - racket.z) * Math.min(1, dt * 12);
  }

  // Swing animation
  if (swinging && swingTarget) {
    swingTimer += dt;
    const t = Math.min(1, swingTimer / SWING_DURATION);
    // Ease out
    const ease = 1 - (1 - t) * (1 - t);
    racket.x += (swingTarget.x - racket.x) * ease * 0.5;
    racket.y += (swingTarget.y - racket.y) * ease * 0.5;
    racket.z += (swingTarget.z - racket.z) * ease * 0.5;

    if (t >= 0.3) {
      performHit();
    }
    if (t >= 1) {
      swinging = false;
      swingTarget = null;
      racket.y = 35;
    }
  } else {
    racket.y += (35 - racket.y) * Math.min(1, dt * 8);
  }

  // Ball physics
  if (ball && ball.alive) {
    ball.x += ball.vx * dt;
    ball.y += ball.vy * dt;
    ball.z += ball.vz * dt;
    ball.vy -= 400 * dt;

    // Ground bounce
    if (ball.y <= 0) {
      ball.y = 0;
      if (!ball.hit && ball.z < NET_Z && ball.z > -10) {
        ball.bounces++;
        if (ball.bounces >= 2) {
          ball.alive = false;
          missedBall();
          // Miss particles
          for (let i = 0; i < 8; i++) {
            const a = Math.random() * Math.PI * 2;
            const sp = 20 + Math.random() * 60;
            particles.push({
              x: ball.x, y: 2, z: ball.z,
              vx: Math.cos(a) * sp, vy: Math.random() * 80, vz: Math.sin(a) * sp * 0.3,
              life: 0.3, hue: 0
            });
          }
        } else {
          // First bounce — go up
          ball.vy = Math.max(120, Math.abs(ball.vy) * 0.6);
          ball.vz *= 0.3;
          ball.vx *= 0.7;
          // Bounce particles
          for (let i = 0; i < 5; i++) {
            const a = Math.random() * Math.PI * 2;
            particles.push({
              x: ball.x, y: 1, z: ball.z,
              vx: Math.cos(a) * 30, vy: Math.random() * 50, vz: Math.sin(a) * 15,
              life: 0.25, hue: 45
            });
          }
        }
      } else if (ball.hit) {
        ball.vy = Math.abs(ball.vy) * 0.35;
        if (ball.vy < 15) ball.alive = false;
      } else {
        // Bounced on far side or something weird
        ball.vy = Math.abs(ball.vy) * 0.3;
        if (ball.vy < 10) { ball.alive = false; missedBall(); }
      }
    }

    // Out of court
    if (ball.z > COURT_L + 80) ball.alive = false;
    if (ball.z < -80 && !ball.hit) { ball.alive = false; missedBall(); }
    if (Math.abs(ball.x) > COURT_W && !ball.hit) { ball.alive = false; missedBall(); }
  }

  // New ball if needed
  if (ball && !ball.alive && ball.hit) {
    const ref = ball;
    ball = null;
    setTimeout(() => { if (state === 'playing' && !ball) createBall(); }, 600);
  }

  // Particles
  for (const p of particles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.z += p.vz * dt;
    p.vy -= 150 * dt;
    p.life -= dt;
  }
  particles = particles.filter(p => p.life > 0);
}

// ---- Drawing ----
function drawCourt() {
  const sx = shake > 0 ? (Math.random() - 0.5) * shake * 5 : 0;
  const sy = shake > 0 ? (Math.random() - 0.5) * shake * 5 : 0;
  ctx.save();
  ctx.translate(sx, sy);

  // Court floor
  const c = [
    project(-COURT_W / 2, 0, 0), project(COURT_W / 2, 0, 0),
    project(COURT_W / 2, 0, COURT_L), project(-COURT_W / 2, 0, COURT_L)
  ].filter(Boolean);
  if (c.length === 4) {
    ctx.beginPath();
    ctx.moveTo(c[0].sx, c[0].sy);
    for (let i = 1; i < 4; i++) ctx.lineTo(c[i].sx, c[i].sy);
    ctx.closePath();
    ctx.fillStyle = '#1a5a30';
    ctx.fill();
    ctx.strokeStyle = '#fff3';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Lines
  const lines = [
    [0, 0, 0, COURT_L],
    [-COURT_W / 2, COURT_L * 0.25, COURT_W / 2, COURT_L * 0.25],
    [-COURT_W / 2, COURT_L * 0.75, COURT_W / 2, COURT_L * 0.75],
  ];
  for (const [x1, z1, x2, z2] of lines) {
    const a = project(x1, 0, z1), b = project(x2, 0, z2);
    if (a && b) {
      ctx.beginPath(); ctx.moveTo(a.sx, a.sy); ctx.lineTo(b.sx, b.sy);
      ctx.strokeStyle = '#fff2'; ctx.lineWidth = 1; ctx.stroke();
    }
  }

  // Net
  const np = [
    project(-COURT_W / 2 - 15, 0, NET_Z), project(-COURT_W / 2 - 15, NET_H, NET_Z),
    project(COURT_W / 2 + 15, NET_H, NET_Z), project(COURT_W / 2 + 15, 0, NET_Z)
  ].filter(Boolean);
  if (np.length === 4) {
    ctx.beginPath();
    ctx.moveTo(np[0].sx, np[0].sy);
    for (let i = 1; i < 4; i++) ctx.lineTo(np[i].sx, np[i].sy);
    ctx.closePath();
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.fill();
    ctx.strokeStyle = '#fff6';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Horizontal net lines
    for (let i = 1; i <= 3; i++) {
      const ly = NET_H * i / 4;
      const a = project(-COURT_W / 2 - 15, ly, NET_Z);
      const b = project(COURT_W / 2 + 15, ly, NET_Z);
      if (a && b) {
        ctx.beginPath(); ctx.moveTo(a.sx, a.sy); ctx.lineTo(b.sx, b.sy);
        ctx.strokeStyle = '#fff2'; ctx.lineWidth = 1; ctx.stroke();
      }
    }
    // Vertical net lines
    for (let i = 1; i <= 7; i++) {
      const lx = -COURT_W / 2 - 15 + (COURT_W + 30) * i / 8;
      const a = project(lx, 0, NET_Z), b = project(lx, NET_H, NET_Z);
      if (a && b) {
        ctx.beginPath(); ctx.moveTo(a.sx, a.sy); ctx.lineTo(b.sx, b.sy);
        ctx.strokeStyle = '#fff1'; ctx.lineWidth = 1; ctx.stroke();
      }
    }
    // Posts
    for (const px of [-COURT_W / 2 - 15, COURT_W / 2 + 15]) {
      const a = project(px, 0, NET_Z), b = project(px, NET_H + 5, NET_Z);
      if (a && b) {
        ctx.beginPath(); ctx.moveTo(a.sx, a.sy); ctx.lineTo(b.sx, b.sy);
        ctx.strokeStyle = '#aaa'; ctx.lineWidth = 3; ctx.stroke();
      }
    }
  }
  ctx.restore();
}

function drawBall3D(bx, by, bz, color) {
  const p = project(bx, by, bz);
  if (!p) return;
  const r = Math.max(2, BALL_R * p.s);

  // Shadow
  const sp = project(bx, 0, bz);
  if (sp) {
    const sr = Math.max(1, BALL_R * 0.6 * sp.s);
    ctx.beginPath();
    ctx.ellipse(sp.sx, sp.sy, sr, sr * 0.3, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fill();
  }

  ctx.beginPath();
  ctx.arc(p.sx, p.sy, r, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = r * 1.5;
  ctx.fill();
  ctx.shadowBlur = 0;

  // Highlight
  ctx.beginPath();
  ctx.arc(p.sx - r * 0.25, p.sy - r * 0.25, r * 0.3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fill();
}

function drawRacket() {
  const p = project(racket.x, racket.y, racket.z);
  if (!p) return;

  // Oval head
  const rw = 32 * p.s;
  const rh = 42 * p.s;

  const headCY = p.sy;

  // Glow when swinging
  const glowAlpha = swinging ? 0.5 : 0.15;
  const glowSize = swinging ? rw * 1.8 : 0;

  if (swinging) {
    ctx.beginPath();
    ctx.ellipse(p.sx, headCY, rw * 1.5, rh * 1.5, 0, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0, 200, 255, 0.1)`;
    ctx.fill();
  }

  // Racket frame (oval)
  ctx.beginPath();
  ctx.ellipse(p.sx, headCY, rw, rh, 0, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(0, 200, 255, ${glowAlpha})`;
  ctx.fill();
  ctx.strokeStyle = '#00ccff';
  ctx.lineWidth = Math.max(1, 3 * p.s);
  ctx.shadowColor = '#00ccff';
  ctx.shadowBlur = 10;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Strings — horizontal
  for (let i = -2; i <= 2; i++) {
    const ly = headCY + i * rh * 0.35;
    // Clip to ellipse width at this y
    const frac = i * 0.35;
    const clipW = rw * Math.sqrt(Math.max(0, 1 - frac * frac));
    ctx.beginPath();
    ctx.moveTo(p.sx - clipW, ly);
    ctx.lineTo(p.sx + clipW, ly);
    ctx.strokeStyle = '#00ccff44';
    ctx.lineWidth = Math.max(0.5, 1 * p.s);
    ctx.stroke();
  }
  // Strings — vertical
  for (let i = -2; i <= 2; i++) {
    const lx = p.sx + i * rw * 0.35;
    const frac = i * 0.35;
    const clipH = rh * Math.sqrt(Math.max(0, 1 - frac * frac));
    ctx.beginPath();
    ctx.moveTo(lx, headCY - clipH);
    ctx.lineTo(lx, headCY + clipH);
    ctx.strokeStyle = '#00ccff44';
    ctx.lineWidth = Math.max(0.5, 1 * p.s);
    ctx.stroke();
  }

  // Handle
  const handleLen = 28 * p.s;
  ctx.beginPath();
  ctx.moveTo(p.sx, headCY + rh);
  ctx.lineTo(p.sx, headCY + rh + handleLen);
  ctx.strokeStyle = '#b8773d';
  ctx.lineWidth = Math.max(2, 4 * p.s);
  ctx.stroke();
  // Grip
  ctx.beginPath();
  ctx.moveTo(p.sx, headCY + rh + handleLen * 0.4);
  ctx.lineTo(p.sx, headCY + rh + handleLen);
  ctx.strokeStyle = '#2a2a4a';
  ctx.lineWidth = Math.max(3, 5 * p.s);
  ctx.stroke();
}

function drawHUD() {
  ctx.fillStyle = '#00ffaa';
  ctx.font = 'bold 28px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`SCORE: ${score}`, 20, 35);

  const spd = BASE_SPEED + score * SPEED_INC;
  ctx.fillStyle = '#888';
  ctx.font = '14px monospace';
  ctx.fillText(`Speed: ${spd}`, 20, 55);

  // Missed indicators
  for (let i = 0; i < MAX_MISSED; i++) {
    const bx = W - 30 - i * 30;
    ctx.beginPath();
    ctx.arc(bx, 28, 10, 0, Math.PI * 2);
    ctx.fillStyle = i < missed ? '#ff3333' : '#333';
    ctx.fill();
    ctx.strokeStyle = i < missed ? '#ff6666' : '#666';
    ctx.lineWidth = 2;
    ctx.stroke();
  }
  ctx.fillStyle = '#aaa';
  ctx.font = '14px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('MISSES', W - 30 - (MAX_MISSED - 1) * 30 - 15, 50);
  ctx.textAlign = 'left';
}

function drawLandingIndicator() {
  if (!ball || !ball.alive || ball.hit) return;

  // Predict where ball will land (y=0)
  // y(t) = ball.y + ball.vy*t - 0.5*400*t^2 = 0
  const a = -200, b = ball.vy, c = ball.y;
  const disc = b * b - 4 * a * c;
  if (disc < 0) return;
  const t = (-b - Math.sqrt(disc)) / (2 * a);
  if (t <= 0) return;

  const landX = ball.x + ball.vx * t;
  const landZ = ball.z + ball.vz * t;

  if (landZ < -20 || landZ > NET_Z + 20) return;

  const lp = project(landX, 1, landZ);
  if (!lp) return;
  const r = Math.max(4, 22 * lp.s);
  const pulse = 0.5 + Math.sin(gameTime * 10) * 0.3;

  ctx.beginPath();
  ctx.ellipse(lp.sx, lp.sy, r, r * 0.4, 0, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(255, 80, 80, ${pulse})`;
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.beginPath();
  ctx.ellipse(lp.sx, lp.sy, r * 0.4, r * 0.15, 0, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(255, 80, 80, ${pulse * 0.5})`;
  ctx.fill();
}

function draw() {
  ctx.fillStyle = '#0a0a2a';
  ctx.fillRect(0, 0, W, H);

  if (state === 'start') {
    drawCourt();
    ctx.fillStyle = '#00ffaa';
    ctx.font = 'bold 44px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('TENNIS 3D', W / 2, H / 2 - 70);
    ctx.font = '17px monospace';
    ctx.fillStyle = '#aaa';
    ctx.fillText('Move mouse on the court', W / 2, H / 2 - 15);
    ctx.fillText('Click to swing and return the ball!', W / 2, H / 2 + 15);
    ctx.fillText(`Miss ${MAX_MISSED} balls and it's game over`, W / 2, H / 2 + 45);
    ctx.fillStyle = '#ffaa00';
    ctx.font = 'bold 24px monospace';
    ctx.fillText('CLICK TO START', W / 2, H / 2 + 95);
    ctx.textAlign = 'left';
    return;
  }

  if (flash > 0) {
    ctx.fillStyle = `rgba(255,255,100,${flash * 0.2})`;
    ctx.fillRect(0, 0, W, H);
  }

  drawCourt();
  drawLandingIndicator();

  // Particles (behind ball)
  for (const p of particles) {
    const pp = project(p.x, p.y, p.z);
    if (!pp) continue;
    const size = Math.max(1, 3 * pp.s);
    ctx.fillStyle = `hsla(${p.hue}, 100%, 70%, ${Math.max(0, p.life)})`;
    ctx.fillRect(pp.sx - size / 2, pp.sy - size / 2, size, size);
  }

  // Ball
  if (ball && ball.alive) {
    const color = ball.hit ? '#00ff88' : '#ffee00';
    drawBall3D(ball.x, ball.y, ball.z, color);
  }

  drawRacket();
  drawHUD();

  if (state === 'over') {
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ff3333';
    ctx.font = 'bold 50px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', W / 2, H / 2 - 50);
    ctx.fillStyle = '#fff';
    ctx.font = '30px monospace';
    ctx.fillText(`Score: ${score}`, W / 2, H / 2 + 5);
    ctx.fillStyle = '#888';
    ctx.font = '18px monospace';
    ctx.fillText(`Ball speed: ${BASE_SPEED + score * SPEED_INC}`, W / 2, H / 2 + 40);
    ctx.fillStyle = '#ffaa00';
    ctx.font = 'bold 22px monospace';
    ctx.fillText('CLICK TO RESTART', W / 2, H / 2 + 90);
    ctx.textAlign = 'left';
  }
}

function gameLoop(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;
  update(dt);
  draw();
  requestAnimationFrame(gameLoop);
}

// ---- Input ----
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) / rect.width * W;
  mouseY = (e.clientY - rect.top) / rect.height * H;
});

canvas.addEventListener('click', () => {
  if (state === 'start' || state === 'over') { startGame(); return; }
  if (state === 'playing') trySwing();
});

lastTime = performance.now();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
